version: 0.2

phases:
  install:
    runtime-versions:
      golang: 1.21
  build:
    commands:
      - echo "Building Go Lambda function..."
      - GOOS=linux GOARCH=amd64 go build -o bootstrap .
  post_build:
    commands:
      - echo "Zipping deployment package..."
      - zip deployment.zip bootstrap
      - |
        if [[ "$CODEBUILD_SOURCE_VERSION" == *"homolog"* ]]; then
          echo "Deploying to homolog..."
          aws lambda update-function-code --function-name go-ru-whatsapp --zip-file fileb://deployment.zip --region sa-east-1
        else
          echo "Deploying to production..."
          aws lambda update-function-code --function-name go-ru-whatsapp --zip-file fileb://deployment.zip --region sa-east-1
        fi
      - echo "Done!"
